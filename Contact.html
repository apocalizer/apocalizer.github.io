   <div class="contact-container">
      <h1>お問い合わせ</h1>
      <p>ご質問など、お気軽にお送りください。<br>
         内容確認次第、担当者よりご連絡させていただきます。<br>
      </p>
   </div>

   <div class="contact-box">
      <h1>お問い合わせフォーム</h1>

      <form id="contactForm">

         <input type="text" id="name" placeholder="お名前">

         <input type="email" id="email" placeholder="メールアドレス">

         <input type="text" id="subject" placeholder="件名">

         <textarea id="message" placeholder="お問い合わせ内容"></textarea>

         <button type="submit">送信</button>

         <p id="result"></p>

      </form>
   </div>

   <p id="result"></p>

   <script src="contact.js"></script>

   <script>
      const WEBHOOK_URL = "https://discord.com/api/webhooks/1494541815058006027/eF_OwGp0EvZ2vPNA7yGoqmod1ftUuwoq6FgpLzCDE7pDmt9PewDCdoWa7lBPv19foVcW";

      document.getElementById("contactForm").addEventListener("submit", async function (e) {
         e.preventDefault();

         const name = document.getElementById("name").value;
         const email = document.getElementById("email").value;
         const subject = document.getElementById("subject").value;
         const message = document.getElementById("message").value;

         const data = {
            content: `名前: ${name}\ne-mail: ${email}\n件名: ${subject}\nメッセージ: ${message}`
         };

         await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: {
               "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
         });

         alert("送信されました");
         this.reset();
      });
   </script>
